name: Publish Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: deploy
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.pages-deploy.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          A98A76: ${{ secrets.A98A76 }}
          B1A9F6: ${{ secrets.B1A9F6 }}
        run: |
          python3 -c "
          import os, sys, pathlib
          a, b = os.environ.get('A98A76', ''), os.environ.get('B1A9F6', '')
          html = pathlib.Path('index.html')
          text = html.read_text(encoding='utf-8')
          patched = text
          if a:
              patched = patched.replace('<!-- 8b6090da755ab99a68990e -->', a)
          if b:
              patched = patched.replace('<!-- 5e5b00f926484043b32c6346fadd9f16ef55347f8a0e1745 -->', b)
          if patched == text and (a or b):
              sys.exit(1)
          if patched != text:
              html.write_text(patched, encoding='utf-8')
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: pages-deploy
        uses: actions/deploy-pages@v4
